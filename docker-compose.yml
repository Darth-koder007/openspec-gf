services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - DATABASE_PATH=/app/data/kudos.db
      - RUST_BACKTRACE=1
    volumes:
      - db-data:/app/data
    networks:
      - kudos-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kudos-network
    restart: unless-stopped

volumes:
  db-data:
    driver: local

networks:
  kudos-network:
    driver: bridge
